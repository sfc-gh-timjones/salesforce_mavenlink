      User dimension combining Salesforce and Mavenlink users.
      Join to fact table on sales_rep_id or project_lead lookup.
    synonyms:
      - users
      - employees
      - reps
      - consultants
    base_table:
      database: ANALYTICS2
      schema: MART
      table: DIM_USER
    primary_key:
      columns:
        - SF_USER_ID
    dimensions:
      - name: SF_USER_ID
        description: Salesforce user ID. Primary key for user dimension.
        expr: SF_USER_ID
        data_type: VARCHAR
        unique: true
      - name: ML_USER_ID
        description: Mavenlink user ID
        expr: ML_USER_ID
        data_type: VARCHAR
      - name: FULL_NAME
        description: Full name
        synonyms:
          - name
          - employee_name
        expr: FULL_NAME
        data_type: VARCHAR
      - name: EMAIL
        description: Email address
        expr: EMAIL
        data_type: VARCHAR
      - name: SF_TITLE
        description: Salesforce job title
        synonyms:
          - title
        expr: SF_TITLE
        data_type: VARCHAR
      - name: ML_TITLE
        description: Mavenlink job title
        expr: ML_TITLE
        data_type: VARCHAR
      - name: DEPARTMENT
        description: Department
        synonyms:
          - team
        expr: DEPARTMENT
        data_type: VARCHAR
      - name: IS_ACTIVE_SALESFORCE
        description: Active in Salesforce
        expr: IS_ACTIVE_SALESFORCE
        data_type: BOOLEAN
      - name: MATCH_STATUS
        description: System match status between Salesforce and Mavenlink
        expr: MATCH_STATUS
        data_type: VARCHAR
        sample_values:
          - Matched
          - Salesforce Only
          - Mavenlink Only
    facts:
      - name: ML_ACTIVE_PROJECTS
        description: Active Mavenlink projects
        expr: ML_ACTIVE_PROJECTS
