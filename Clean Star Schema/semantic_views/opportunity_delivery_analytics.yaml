        - ACCOUNT_ID
    dimensions:
      - name: ACCOUNT_ID
        description: Salesforce account ID. Primary key for customer dimension.
        expr: ACCOUNT_ID
        data_type: VARCHAR
        unique: true
      - name: ACCOUNT_NAME
        description: Company name
        synonyms:
          - customer_name
          - company_name
        expr: ACCOUNT_NAME
        data_type: VARCHAR
      - name: INDUSTRY
        description: Industry classification
        synonyms:
          - vertical
          - sector
        expr: INDUSTRY
        data_type: VARCHAR
      - name: BILLING_CITY
        description: City
        synonyms:
          - city
        expr: BILLING_CITY
        data_type: VARCHAR
      - name: BILLING_STATE
        description: State/Province
        synonyms:
          - state
        expr: BILLING_STATE
        data_type: VARCHAR
      - name: BILLING_COUNTRY
        description: Country
        synonyms:
          - country
        expr: BILLING_COUNTRY
        data_type: VARCHAR
      - name: PHONE
        description: Phone number
        expr: PHONE
        data_type: VARCHAR
      - name: WEBSITE
        description: Company website
        expr: WEBSITE
        data_type: VARCHAR
    time_dimensions:
      - name: LAST_ACTIVITY_DATE
        description: Most recent activity
        expr: LAST_ACTIVITY_DATE
        data_type: DATE
      - name: CREATED_DATE
        description: Account creation date
        expr: CREATED_DATE
        data_type: TIMESTAMP_NTZ
    facts:
      - name: ANNUAL_REVENUE
        description: Annual revenue
        expr: ANNUAL_REVENUE
        data_type: NUMBER
      - name: NUMBER_OF_EMPLOYEES
        description: Employee count
        synonyms:
          - headcount
        expr: NUMBER_OF_EMPLOYEES
        data_type: NUMBER
      - name: TOTAL_OPPORTUNITIES
        description: Total opportunities
        expr: TOTAL_OPPORTUNITIES
        data_type: NUMBER
      - name: WON_OPPORTUNITIES
        description: Won opportunities
        expr: WON_OPPORTUNITIES
        data_type: NUMBER
      - name: LOST_OPPORTUNITIES
        description: Lost opportunities
        expr: LOST_OPPORTUNITIES
        data_type: NUMBER
      - name: OPEN_OPPORTUNITIES
        description: Open opportunities
        expr: OPEN_OPPORTUNITIES
        data_type: NUMBER
      - name: TOTAL_WON_REVENUE
        description: Total won revenue
        expr: TOTAL_WON_REVENUE
        data_type: NUMBER
      - name: OPEN_PIPELINE_VALUE
        description: Open pipeline value
        expr: OPEN_PIPELINE_VALUE
        data_type: NUMBER
      - name: AVG_WON_DEAL_SIZE
        description: Average won deal size
        expr: AVG_WON_DEAL_SIZE
        data_type: NUMBER
      - name: WIN_RATE_PCT
        description: Win rate percentage
        expr: WIN_RATE_PCT
        data_type: NUMBER

  - name: DIM_USER
