        unique: true
      - name: PROJECT_NAME
        description: Project name
        synonyms:
          - name
          - workspace_name
        expr: PROJECT_NAME
        data_type: VARCHAR
      - name: PROJECT_STATUS
        description: Current status of the project
        synonyms:
          - status
        expr: PROJECT_STATUS
        data_type: VARCHAR
        sample_values:
          - active
          - completed
          - cancelled
          - archived
      - name: HEALTH_STATUS
        description: Health status of the project
        expr: HEALTH_STATUS
        data_type: VARCHAR
        sample_values:
          - On Track
          - At Risk - Over Budget
          - At Risk - Overdue
          - In Progress
          - completed
