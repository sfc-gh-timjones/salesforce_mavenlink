      - name: ML_TOTAL_HOURS
        description: Total hours logged
        expr: ML_TOTAL_HOURS
        data_type: NUMBER
      - name: ML_BILLABLE_HOURS
        description: Billable hours
        expr: ML_BILLABLE_HOURS
        data_type: NUMBER
      - name: ML_UTILIZATION_PCT
        description: Utilization percentage
        expr: ML_UTILIZATION_PCT
        data_type: NUMBER

